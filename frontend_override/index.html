<style>
  :root{
    --bg0:#060812;
    --bg1:#0b1024;
    --card: rgba(255,255,255,.06);
    --card2: rgba(255,255,255,.10);
    --stroke: rgba(255,255,255,.12);
    --text: rgba(255,255,255,.92);
    --muted: rgba(255,255,255,.68);
    --muted2: rgba(255,255,255,.55);
    --accent:#7c3aed;
    --accent2:#22c55e;
    --danger:#ef4444;
    --shadow: 0 18px 60px rgba(0,0,0,.45);
    --radius: 18px;
    --radius2: 26px;
    --focus: 0 0 0 4px rgba(124,58,237,.25);
    font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    color: var(--text);
    color-scheme: dark;
  }

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(1200px 700px at 10% 10%, rgba(124,58,237,.35), transparent 55%),
      radial-gradient(1000px 600px at 85% 15%, rgba(34,197,94,.26), transparent 55%),
      radial-gradient(900px 700px at 70% 80%, rgba(59,130,246,.18), transparent 60%),
      linear-gradient(180deg, var(--bg0), var(--bg1));
    overflow-x:hidden;
  }

  .glow{
    position:fixed;
    inset:-20%;
    background:
      radial-gradient(closest-side, rgba(124,58,237,.14), transparent 55%),
      radial-gradient(closest-side, rgba(34,197,94,.11), transparent 60%);
    filter: blur(40px);
    animation: drift 18s ease-in-out infinite alternate;
    pointer-events:none;
    z-index:-1;
  }
  @keyframes drift{
    0%{ transform: translate3d(-2%, -1%, 0) scale(1.02); }
    100%{ transform: translate3d(2%, 2%, 0) scale(1.08); }
  }

  .wrap{
    max-width: 1120px;
    margin: 0 auto;
    padding: 26px 18px 48px;
    animation: pageIn .55s ease-out both;
  }
  @keyframes pageIn{
    from{ opacity:0; transform: translateY(10px); }
    to{ opacity:1; transform: translateY(0); }
  }

  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    margin-bottom: 18px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .logo{
    width:42px;height:42px;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(124,58,237,.95), rgba(34,197,94,.85));
    box-shadow: 0 10px 30px rgba(124,58,237,.25);
    display:grid; place-items:center;
    transform: translateZ(0);
    position:relative;
    overflow:hidden;
  }
  .logo:before{
    content:"";
    position:absolute;
    inset:-40%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.55), transparent 45%);
    transform: rotate(15deg);
    animation: shine 2.8s ease-in-out infinite;
    opacity:.55;
  }
  @keyframes shine{
    0%,100%{ transform: translateX(-12%) rotate(15deg); opacity:.35; }
    50%{ transform: translateX(12%) rotate(15deg); opacity:.65; }
  }
  .logo svg{ position:relative; z-index:1; opacity:.95; }

  .titleBlock h1{
    margin:0;
    font-size: 20px;
    letter-spacing: .2px;
    line-height:1.1;
  }

  .pill{
    display:flex;
    gap:10px;
    align-items:center;
    padding:10px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,.05);
    border:1px solid var(--stroke);
    backdrop-filter: blur(10px);
  }
  .pill small{ color: var(--muted2); }
  .dot{
    width:10px;height:10px;border-radius:99px;
    background: var(--accent2);
    box-shadow: 0 0 0 6px rgba(34,197,94,.14);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ transform: scale(1); opacity: .95; }
    50%{ transform: scale(1.15); opacity: .75; }
  }

  .grid{
    display:grid;
    grid-template-columns: 1.05fr .95fr;
    gap: 16px;
  }
  @media (max-width: 980px){
    .grid{ grid-template-columns: 1fr; }
  }

  .card{
    background: var(--card);
    border: 1px solid var(--stroke);
    border-radius: var(--radius2);
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
    padding: 16px;
    position:relative;
    overflow:hidden;
  }
  .card:before{
    content:"";
    position:absolute;
    inset:-1px;
    background: radial-gradient(800px 240px at 20% 0%, rgba(124,58,237,.18), transparent 60%);
    pointer-events:none;
  }

  .cardHead{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
    margin-bottom: 12px;
    position:relative;
    flex-wrap:wrap;
  }
  .cardHead h2{
    margin:0;
    font-size: 14px;
    letter-spacing:.2px;
    color: rgba(255,255,255,.92);
  }
  .cardHead .sub{
    margin-top:6px;
    font-size:12px;
    color: var(--muted);
  }

  .tabs{
    display:grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap:8px;
    background: rgba(255,255,255,.05);
    border:1px solid var(--stroke);
    border-radius: 20px;
    padding:6px;
    width:100%;
    max-width: 560px;
    position:relative;
  }

  .tab{
    border:0;
    background: transparent;
    color: var(--muted);
    padding: 12px 14px;
    border-radius: 14px;
    cursor:pointer;
    font-weight: 700;
    font-size: 13px;
    transition: .18s ease;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    text-align:center;
    min-height: 46px;
    white-space: nowrap;
  }
  .tab svg{
    opacity:.85;
    flex-shrink:0;
  }
  .tab.active{
    background: linear-gradient(135deg, rgba(124,58,237,.95), rgba(99,102,241,.65));
    color: white;
    box-shadow: 0 10px 28px rgba(124,58,237,.25);
  }
  .tab:hover{ transform: translateY(-1px); }

  @media (max-width: 760px){
    .tabs{
      grid-template-columns: 1fr;
      max-width: none;
    }

    .tab{
      width:100%;
      justify-content:flex-start;
      text-align:left;
    }
  }

  .form{
    display:grid;
    gap: 12px;
    margin-top: 12px;
    position:relative;
  }
  .row{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:12px;
  }
  @media (max-width: 560px){
    .row{ grid-template-columns: 1fr; }
  }

  label{
    display:block;
    font-size: 12px;
    color: var(--muted);
    margin: 0 0 6px;
  }

  input, select, textarea{
    width:100%;
    box-sizing:border-box;
    border-radius: 14px;
    border: 1px solid var(--stroke);
    background: rgba(0,0,0,.22);
    color: var(--text);
    padding: 11px 12px;
    outline:none;
    transition: .18s ease;
  }

  select{
    appearance:none;
    -webkit-appearance:none;
    -moz-appearance:none;
    background:
      linear-gradient(45deg, transparent 50%, rgba(255,255,255,.75) 50%),
      linear-gradient(135deg, rgba(255,255,255,.75) 50%, transparent 50%),
      rgba(0,0,0,.22);
    background-position:
      calc(100% - 18px) calc(50% - 3px),
      calc(100% - 12px) calc(50% - 3px),
      0 0;
    background-size: 6px 6px, 6px 6px, 100% 100%;
    background-repeat: no-repeat;
    padding-right: 38px;
  }

  select option{
    background: #10182b;
    color: #f3f4f6;
  }

  select option:checked,
  select option:hover{
    background: #7c3aed;
    color: #ffffff;
  }

  input:focus, select:focus, textarea:focus{
    box-shadow: var(--focus);
    border-color: rgba(124,58,237,.45);
    transform: translateY(-1px);
  }

  input::placeholder, textarea::placeholder{
    color: rgba(255,255,255,.35);
  }

  .btnRow{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top: 6px;
  }
  .btn{
    border: 1px solid var(--stroke);
    background: rgba(255,255,255,.06);
    color: rgba(255,255,255,.88);
    padding: 11px 14px;
    border-radius: 16px;
    cursor:pointer;
    font-weight: 800;
    font-size: 13px;
    transition: .18s ease;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .btn:hover{ transform: translateY(-1px); background: rgba(255,255,255,.10); }
  .btn:active{ transform: translateY(0); }
  .btn.primary{
    border-color: rgba(124,58,237,.35);
    background: linear-gradient(135deg, rgba(124,58,237,.95), rgba(59,130,246,.75));
    color: #fff;
    box-shadow: 0 16px 40px rgba(124,58,237,.24);
  }
  .btn.primary:hover{ filter: brightness(1.02); }
  .btn.danger{
    border-color: rgba(239,68,68,.35);
    background: rgba(239,68,68,.10);
    color: rgba(255,255,255,.9);
  }

  .spinner{
    width:16px;height:16px;
    border-radius:99px;
    border: 2px solid rgba(255,255,255,.25);
    border-top-color: rgba(255,255,255,.95);
    animation: spin .7s linear infinite;
    display:none;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .status{
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
    min-height: 18px;
  }
  .status.ok{ color: rgba(34,197,94,.95); }
  .status.err{ color: rgba(239,68,68,.95); }

  .outputBox{
    border-radius: var(--radius2);
    border:1px solid var(--stroke);
    background: rgba(0,0,0,.18);
    padding: 14px;
    position:relative;
    overflow:hidden;
  }
  .outputTitle{
    font-weight: 900;
    font-size: 14px;
    margin: 0 0 10px;
    color: rgba(255,255,255,.92);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .outputText{
    white-space: pre-wrap;
    line-height: 1.55;
    color: rgba(255,255,255,.86);
    font-size: 14px;
    min-height: 80px;
  }

  .shimmer{
    position:absolute;
    inset:0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent);
    transform: translateX(-100%);
    animation: shimmer 1.1s ease-in-out infinite;
    display:none;
    pointer-events:none;
  }
  @keyframes shimmer{
    0%{ transform: translateX(-100%); }
    100%{ transform: translateX(100%); }
  }

  .history{
    margin-top: 12px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .historyTop{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .historyTop select{
    max-width: 220px;
    background-color: rgba(0,0,0,.22);
    color: var(--text);
  }
  .hList{
    display:flex;
    flex-direction:column;
    gap:10px;
    max-height: 420px;
    overflow:auto;
    padding-right: 4px;
  }
  .hItem{
    border: 1px solid var(--stroke);
    background: rgba(255,255,255,.05);
    border-radius: 16px;
    padding: 12px;
    cursor:pointer;
    transition: .16s ease;
    animation: pop .32s ease both;
  }
  @keyframes pop{ from{ opacity:0; transform: translateY(6px);} to{ opacity:1; transform: translateY(0);} }
  .hItem:hover{ transform: translateY(-1px); background: rgba(255,255,255,.08); }
  .hMeta{
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:space-between;
    margin-bottom: 6px;
  }
  .badge{
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 999px;
    border:1px solid var(--stroke);
    background: rgba(0,0,0,.18);
    color: var(--muted);
    white-space:nowrap;
  }
  .hText{
    font-size: 12px;
    color: rgba(255,255,255,.78);
    line-height: 1.4;
    display:-webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow:hidden;
  }

  .toast{
    position: fixed;
    right: 18px;
    bottom: 18px;
    width: min(360px, calc(100vw - 36px));
    border-radius: 18px;
    border: 1px solid var(--stroke);
    background: rgba(0,0,0,.35);
    backdrop-filter: blur(10px);
    box-shadow: var(--shadow);
    padding: 12px 12px;
    transform: translateY(16px);
    opacity:0;
    pointer-events:none;
    transition: .22s ease;
  }
  .toast.show{ opacity:1; transform: translateY(0); }
  .toast .tTitle{ font-weight: 900; font-size: 13px; margin-bottom: 4px; }
  .toast .tText{ font-size: 12px; color: var(--muted); line-height: 1.35; }
</style>
